
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Aurevia AI Assistant</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:#f8fafc;

height:100vh;

overflow:hidden;

display:flex;

color:#1e293b;

}


/* SIDEBAR */

.sidebar{

width:320px;

background:rgba(255,255,255,0.92);

backdrop-filter:blur(15px);

padding:25px;

display:flex;

flex-direction:column;

border-right:1px solid rgba(255,255,255,0.08);

}

.logo{

font-size:28px;

font-weight:700;

margin-bottom:30px;

}

.new-chat{

background:linear-gradient(
135deg,
#2563eb,
#60a5fa
);

padding:18px;

border:none;

border-radius:18px;

font-size:18px;

font-weight:600;

color:white;

cursor:pointer;

margin-bottom:30px;

}

.history{

flex:1;

overflow-y:auto;

}

.history-item{

background:rgba(101, 127, 105, 0.08);

padding:18px;

border-radius:16px;

margin-bottom:16px;

cursor:pointer;

transition:0.3s;

}

.history-item:hover{

background:rgba(126, 33, 33, 0.15);

}


/* MAIN CHAT */
.main{

flex:1;

display:flex;

flex-direction:column;

background:

linear-gradient(
rgba(255,255,255,0.55),
rgba(255,255,255,0.65)
),

url("https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?auto=format&fit=crop&w=2000&q=80");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

background-attachment:fixed;

}


/* HEADER */

.header{

padding:28px;

font-size:40px;

font-weight:700;

border-bottom:1px solid rgba(217, 0, 0, 0.08);

backdrop-filter:blur(12px);

}


/* CHAT AREA */

.chat-container{

flex:1;

overflow-y:auto;

padding:40px;

display:flex;

flex-direction:column;

gap:25px;

}


/* MESSAGE */

.message{

max-width:70%;

padding:22px;

border-radius:24px;

line-height:1.8;

font-size:17px;

white-space:pre-wrap;

}

.bot{

background:rgba(255,255,255,0.88);

backdrop-filter:blur(15px);

color:#1e293b;

align-self:flex-start;

box-shadow:0 8px 25px rgba(0,0,0,0.08);

}

.user{

background:linear-gradient(
135deg,
#2563eb,
#60a5fa
);

color:white;

align-self:flex-end;

}


/* INPUT AREA */

.input-area{

position:sticky;

bottom:0;

display:flex;

gap:18px;

padding:20px;

background:rgba(255,255,255,0.95);

backdrop-filter:blur(15px);

border-top:1px solid #dbeafe;

z-index:999;

}

/* INPUT BOX */

.input-area input{

flex:1;

height:65px;

padding:0 25px;

border:none;

border-radius:18px;

background:#ffffff;

color:#1e293b;

font-size:18px;

font-weight:500;

outline:none;

box-shadow:0 4px 15px rgba(0,0,0,0.08);

}

/* PLACEHOLDER */

.input-area input::placeholder{

color:#64748b;

opacity:1;

}

/* SEND BUTTON */

.input-area button{

width:140px;

height:65px;

border:none;

border-radius:18px;

background:linear-gradient(
135deg,
#2563eb,
#60a5fa
);

color:white;

font-size:18px;

font-weight:600;

cursor:pointer;

}


/* MOBILE */

@media(max-width:768px){

.sidebar{

display:none;

}

.message{

max-width:90%;

}

.header{

font-size:28px;

}

}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
Aurevia AI Assistant
</div>

<button class="new-chat" onclick="newChat()">
+ New Chat
</button>


<!-- HISTORY -->

<div class="history" id="history">

<div class="history-item">
Manufacturing Errors
</div>

<div class="history-item">
Compression Failure
</div>

<div class="history-item">
Contamination Analysis
</div>

</div>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">
Aurevia AI Assistant
</div>


<!-- CHAT -->

<div class="chat-container" id="chatContainer">

<div class="message bot">

Hello 👋

Welcome to Aurevia AI Assistant.

Ask about:
- batch analysis
- errors
- justifications

</div>

</div>


<!-- INPUT -->

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Message Assistant..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>


<script>

const chatContainer =
document.getElementById("chatContainer");

const historyContainer =
document.getElementById("history");


/* SEND MESSAGE */

async function sendMessage(){

const input =
document.getElementById("userInput");

const text = input.value.trim();

if(!text) return;


/* USER MESSAGE */

const userDiv =
document.createElement("div");

userDiv.className =
"message user";

userDiv.innerHTML = text;

chatContainer.appendChild(userDiv);


/* HISTORY */

const historyItem =
document.createElement("div");

historyItem.className =
"history-item";

historyItem.innerHTML = text;

historyContainer.prepend(historyItem);


/* CLEAR INPUT */

input.value = "";


/* BOT LOADING */

const botDiv =
document.createElement("div");

botDiv.className =
"message bot";

botDiv.innerHTML =
"Analyzing manufacturing records...";

chatContainer.appendChild(botDiv);

chatContainer.scrollTop =
chatContainer.scrollHeight;


/* CALL FLASK */

try{

const response = await fetch(

"/ask_ai",

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
question:text
})

}

);

const data = await response.json();

botDiv.innerHTML = data.answer;

}
catch(error){

botDiv.innerHTML =
"AI Server Error";

console.log(error);

}

chatContainer.scrollTop =
chatContainer.scrollHeight;

}


/* NEW CHAT */

function newChat(){

location.reload();

}

</script>

</body>

</html>
